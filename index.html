<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AppShift — Discover Newly Submitted Apps</title>
<meta name="description" content="Fresh software discovered by the AppShift community. Browse, compare, and find your next favorite tool."/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script>
tailwind.config={theme:{extend:{colors:{page:'#0a0f1e',card:'#0d1526',accent:'#6366f1',teal:'#14b8a6',txt:'#f1f5f9',muted:'#94a3b8'},fontFamily:{sans:['Inter','sans-serif']}}}}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:#0a0f1e;color:#f1f5f9}
.glass{background:rgba(255,255,255,0.05);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.1);border-radius:1rem}
.card-hover:hover{transform:translateY(-4px);box-shadow:0 8px 32px rgba(99,102,241,0.2)}
.card-hover{transition:all .3s ease}
@keyframes gradShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.anim-grad{background:linear-gradient(135deg,#6366f1,#14b8a6,#6366f1,#14b8a6);background-size:300% 300%;animation:gradShift 8s ease infinite}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .6s ease forwards}
.chip{transition:all .2s ease}.chip:hover{background:rgba(99,102,241,0.3)}
.chip-active{background:rgba(99,102,241,0.3)!important;border-color:#6366f1!important;color:#f1f5f9!important}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0a0f1e}::-webkit-scrollbar-thumb{background:#6366f1;border-radius:3px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-type="module">
const {useState,useMemo,useCallback,useEffect,useRef}=React;

const APPS=[
{name:"Faceoff",link:"https://www.vincentgregoire.com/faceoff/",desc:"A TUI app for following NHL hockey games in real-time.",license:"Free, Open Source (MIT)",type:"Live Score App",platforms:"Mac, Windows, Linux, BSD, Python",features:"CLI, Live Score, Terminal-based, Real-time updates, Python-based",origin:"Canada"},
{name:"GitWand",link:"https://gitwand.devlint.fr/",desc:"Native Git client with smart merge conflict resolution.",license:"Free, Open Source (MIT)",type:"Version Control System",platforms:"Mac, Linux, Windows, VS Code",features:"File Versioning, Works Offline, No Tracking, Dark Mode, Git Support, Syntax Highlighting",origin:""},
{name:"TeamBridge",link:"https://github.com/Mecacerf/TeamBridge",desc:"Open-source tool tracking attendance, work hours, vacations, and absences for small teams using Excel files.",license:"Free, Open Source (AGPL-3.0)",type:"Employee Management Tool",platforms:"Windows",features:"Employee Management, Workflow, Performance Tracking",origin:"Switzerland"},
{name:"Brave Origin",link:"https://brave.com/origin/download-nightly/",desc:"Minimalist privacy browser with ad-block, Shields, no crypto, one-time activation.",license:"Pay once ($60), Proprietary",type:"Web Browser",platforms:"Mac, Windows, Linux, Android, iPhone, iPad",features:"Ad-free, Block Trackers, No Tracking, Dark Mode, Built-in Ad-blocker",origin:"United States"},
{name:"Dinky",link:"https://dinkyfiles.com",desc:"Free macOS app that shrinks images, videos, and PDFs by drag-and-drop.",license:"Free, Open Source (MIT)",type:"Image Optimizer / File Compressor",platforms:"Mac",features:"Drag & Drop, Lossless Compression, PDF compression, Batch conversion, Video Converter",origin:"United States"},
{name:"Open Pencil",link:"https://openpencil.dev",desc:"Open-source vector and UI design editor with AI tools, Figma file support, P2P collaboration, and code export.",license:"Free, Open Source (MIT)",type:"UI Design Tool / Vector App",platforms:"Mac, Windows, Linux, Online, Homebrew",features:"Real-time Collaboration, AI-Powered, Figma Import, Auto Layout, Design-to-Code (JSX/Tailwind), WebRTC, MCP Support",origin:"Russia"},
{name:"Personal Computer",link:"https://www.perplexity.ai/personal-computer",desc:"Cloud-based AI agent functioning as a persistent digital worker with always-on local machine access.",license:"Paid, Proprietary",type:"LLM Tool",platforms:"Online",features:"Task Automation, Workflow Automation, AI-Powered",origin:"United States"},
{name:"WiiFin",link:"https://wiifin.zipna.me",desc:"Experimental Jellyfin homebrew client for Nintendo Wii with media browsing, playback, and progress sync.",license:"Free, Open Source (GPL-3.0)",type:"Media Player",platforms:"Nintendo Wii / Wii U, Dolphin Emulator",features:"Video Playback, Audio Playback, Movie Streaming, Cover Art, Pointer Controls",origin:"France"},
{name:"Notch Pilot",link:"https://github.com/devmegablaster/Notch-Pilot",desc:"Live companion for Claude Code that lives in your MacBook notch.",license:"Free, Open Source (MIT)",type:"AI Coding Assistant",platforms:"Mac, Homebrew",features:"Status Monitoring, Real-time Usage Limits, Dark Mode, No Tracking, Ad-free",origin:"India"},
{name:"Tuta Drive",link:"https://tuta.com/drive",desc:"End-to-end encrypted cloud storage using quantum-resistant cryptography. Currently in closed beta.",license:"Free, Open Source (GPL-3.0)",type:"Cloud Storage Service",platforms:"Online",features:"E2E Encryption, Quantum-Safe Encryption, GDPR Compliant, 2FA, Encrypted Backup",origin:"Germany"},
{name:"Thunderbolt",link:"https://thunderbolt.io",desc:"Open-source cross-platform AI client with model selection, on-prem deployment, and enterprise features.",license:"Free, Open Source (MPL-2.0)",type:"AI Chatbot / LLM Tool",platforms:"Mac, Windows, Linux, Android, iPhone, Self-Hosted, Docker",features:"AI Chatbot, MCP Support, No Tracking, Plugin Support, AI-Powered",origin:"United States"},
{name:"Vibe Island",link:"https://vibeisland.app",desc:"macOS notch panel for monitoring AI agents: Claude Code, Codex, Gemini CLI, Cursor, and more.",license:"Pay once ($15), Proprietary",type:"AI Coding Assistant",platforms:"Mac",features:"AI-Powered, Dark Mode, Zero Configuration, Ad-free",origin:""},
{name:"Nothing Warp",link:"https://nothing.community/d/55831-introducing-nothing-warp",desc:"Browser extension to move files, links, text, and images between computer and Android phone via Google Drive.",license:"Free, Proprietary",type:"File Transfer Service",platforms:"Android, Google Chrome",features:"File Sending, Large File Transfer, Image Sharing, No Tracking",origin:"United Kingdom"},
{name:"FluidCAD",link:"https://fluidcad.io",desc:"Browser-based parametric 3D CAD with JavaScript scripting, interactive viewport editing, and feature history.",license:"Free, Open Source (LGPL-2.1)",type:"CAD Software / 3D Modeler",platforms:"VS Code, JavaScript, Node.js",features:"Parametric Modeling, 3D Renderer, Works Offline, STEP Import/Export, Dark Mode",origin:""},
{name:"TermOnMac",link:"https://termonmac.com",desc:"Remote terminal for Mac via iPhone/iPad. No SSH setup required, end-to-end encrypted, QR code pairing.",license:"Freemium ($1–3/month), Proprietary",type:"Terminal Emulator / SSH Client",platforms:"iPhone, iPad",features:"E2E Encryption, AI-Powered, Dark Mode, CLI, Ad-free",origin:"Taiwan"},
{name:"PureMac",link:"https://github.com/momenbasel/PureMac",desc:"Free open-source macOS cleaner. CleanMyMac alternative with zero telemetry.",license:"Free, Open Source (MIT)",type:"System Cleaner",platforms:"Mac, Homebrew",features:"No Tracking, Works Offline, Dark Mode, No Registration, Ad-free",origin:"United Arab Emirates"},
{name:"Bag",link:"https://bitbag.app/",desc:"Bitcoin-only price tracker and net worth dashboard with DCA tracker, price charts, and home screen widget.",license:"Freemium ($8 one-time), Open Source (GPL-3.0)",type:"Crypto Portfolio Tracker",platforms:"Android, F-Droid, iPhone",features:"Bitcoin Price Ticker, DCA Tracker, Tor via Orbot, Watch-only Wallet Tracking",origin:"United Kingdom"},
{name:"Delineato",link:"https://delineato.app",desc:"Minimalist diagramming and mind mapping tool for freelancers and creative teams.",license:"Freemium ($6–16/month), Proprietary",type:"Diagram Editor / Wireframing Tool",platforms:"Online, Android, iPhone, iPad",features:"Mind Mapping, Wireframing, ChatGPT Plugin, Markdown Import, PNG Export",origin:"Portugal"},
{name:"Astropad Workbench",link:"https://astropad.com/product/workbench/",desc:"High-performance remote desktop to connect to your Mac from iPhone or iPad.",license:"Freemium ($4–10/month), Proprietary",type:"Remote Desktop Tool",platforms:"Mac, iPhone, iPad",features:"Apple Pencil Support, E2E Encryption, 2FA, Low Latency, Multi-Monitor Support",origin:"United States"}
];

const AVATAR_COLORS=['#6366f1','#14b8a6','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#10b981'];
const getColor=(n)=>AVATAR_COLORS[n.charCodeAt(0)%AVATAR_COLORS.length];
const getLicenseBadge=(l)=>{if(l.startsWith('Free'))return{bg:'bg-emerald-500/20',text:'text-emerald-400',label:'Free'};if(l.startsWith('Freemium'))return{bg:'bg-yellow-500/20',text:'text-yellow-400',label:'Freemium'};if(l.startsWith('Pay once'))return{bg:'bg-orange-500/20',text:'text-orange-400',label:'Pay Once'};return{bg:'bg-red-500/20',text:'text-red-400',label:'Paid'}};
const CATEGORIES=[{icon:'🖥️',name:'Developer Tools',count:5},{icon:'🤖',name:'AI & LLM',count:6},{icon:'🎨',name:'Design',count:3},{icon:'🔐',name:'Privacy',count:4},{icon:'🗂️',name:'File & Storage',count:3},{icon:'📱',name:'Mobile',count:4},{icon:'🎮',name:'Media',count:2},{icon:'🏢',name:'Productivity',count:3}];
const CHIPS=['All','Free','Open Source','AI-Powered','Mac','Windows','Mobile','Online'];

function NewAppsPage(){
const[view,setView]=useState('home');
const[search,setSearch]=useState('');
const[chip,setChip]=useState('All');
const[licFilter,setLicFilter]=useState('all');
const[platFilter,setPlatFilter]=useState([]);
const[typeFilter,setTypeFilter]=useState('all');
const[sortBy,setSortBy]=useState('newest');
const[mobileMenu,setMobileMenu]=useState(false);
const[mobSidebar,setMobSidebar]=useState(false);

const togglePlat=(p)=>setPlatFilter(prev=>prev.includes(p)?prev.filter(x=>x!==p):[...prev,p]);
const resetFilters=()=>{setSearch('');setChip('All');setLicFilter('all');setPlatFilter([]);setTypeFilter('all');setSortBy('newest')};

const filtered=useMemo(()=>{
let r=[...APPS];
if(search){const s=search.toLowerCase();r=r.filter(a=>a.name.toLowerCase().includes(s)||a.desc.toLowerCase().includes(s)||a.type.toLowerCase().includes(s)||a.features.toLowerCase().includes(s))}
if(chip!=='All'){
if(chip==='Free')r=r.filter(a=>a.license.startsWith('Free'));
else if(chip==='Open Source')r=r.filter(a=>a.license.includes('Open Source'));
else if(chip==='AI-Powered')r=r.filter(a=>a.features.includes('AI-Powered'));
else if(chip==='Mobile')r=r.filter(a=>/iPhone|iPad|Android/.test(a.platforms));
else r=r.filter(a=>a.platforms.includes(chip));
}
if(licFilter!=='all'){
if(licFilter==='free')r=r.filter(a=>a.license.startsWith('Free'));
else if(licFilter==='freemium')r=r.filter(a=>a.license.startsWith('Freemium'));
else if(licFilter==='payonce')r=r.filter(a=>a.license.startsWith('Pay once'));
else if(licFilter==='paid')r=r.filter(a=>a.license.startsWith('Paid'));
}
if(platFilter.length>0)r=r.filter(a=>platFilter.some(p=>a.platforms.includes(p)));
if(typeFilter!=='all')r=r.filter(a=>a.type.includes(typeFilter));
if(sortBy==='name')r.sort((a,b)=>a.name.localeCompare(b.name));
else if(sortBy==='license')r.sort((a,b)=>a.license.localeCompare(b.license));
return r;
},[search,chip,licFilter,platFilter,typeFilter,sortBy]);

const allTypes=[...new Set(APPS.map(a=>a.type))];
const allPlats=[...new Set(APPS.flatMap(a=>a.platforms.split(', ')))].sort();

const renderAppCard = (app, i) => {
  const lb=getLicenseBadge(app.license);
  const feats=app.features.split(', ');
  const shown=feats.slice(0,5);
  const extra=feats.length-5;
  return(
    <article key={app.name} className="glass p-5 card-hover flex flex-col" style={{animationDelay:`${i*50}ms`}}>
      <div className="flex items-start justify-between mb-3">
        <div className="flex items-center gap-3">
          <div className="w-10 h-10 rounded-xl flex items-center justify-center text-lg font-bold text-white shrink-0" style={{background:getColor(app.name)}}>{app.name[0]}</div>
          <div><a href={app.link} target="_blank" rel="noopener noreferrer" className="text-txt font-semibold hover:text-accent transition text-sm">{app.name}</a><div className="text-xs bg-accent/20 text-accent px-2 py-0.5 rounded-full inline-block mt-0.5">{app.type}</div></div>
        </div>
        <span className="text-[10px] bg-teal/20 text-teal px-2 py-0.5 rounded-full font-semibold shrink-0">NEW</span>
      </div>
      <p className="text-muted text-sm mb-3 flex-grow">{app.desc}</p>
      <div className="flex flex-wrap gap-1.5 mb-2">{app.platforms.split(', ').map(p=><span key={p} className="text-[11px] bg-white/5 border border-white/10 px-2 py-0.5 rounded-md text-muted">{p}</span>)}</div>
      <div className="flex flex-wrap gap-1 mb-3">{shown.map(f=><span key={f} className="text-[10px] bg-teal/10 text-teal px-1.5 py-0.5 rounded-full">{f}</span>)}{extra>0&&<span className="text-[10px] text-muted">+{extra} more</span>}</div>
      <div className="flex items-center justify-between mt-auto pt-3 border-t border-white/5">
        <div className="flex items-center gap-2"><span className={`text-[11px] ${lb.bg} ${lb.text} px-2 py-0.5 rounded-full font-medium`}>{lb.label}</span>{app.origin&&<span className="text-[11px] text-muted">🌍 {app.origin}</span>}</div>
        <a href={app.link} target="_blank" rel="noopener noreferrer" className="text-xs text-accent hover:text-accent/80 font-medium transition">Visit Site →</a>
      </div>
    </article>
  );
};

return(
<div className="min-h-screen bg-page font-sans">
{/* NAVBAR */}
<nav className="sticky top-0 z-50 glass border-b border-white/10" style={{background:'rgba(10,15,30,0.85)',backdropFilter:'blur(16px)'}}>
<div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
<a href="#" onClick={(e)=>{e.preventDefault();setView('home');}} className="flex items-center gap-2 text-xl font-bold text-txt" aria-label="AppShift Home"><span className="text-accent text-2xl">⬡</span>AppShift</a>
<div className="hidden md:flex items-center gap-6 text-sm text-muted">
<a href="#" onClick={(e)=>{e.preventDefault();setView('browse');}} className={`transition ${view==='browse'?'text-txt font-semibold':'hover:text-txt'}`}>Browse</a>
<a href="#" onClick={(e)=>{e.preventDefault();setView('home');}} className={`transition ${view==='home'?'text-txt font-semibold':'hover:text-txt'}`}>New Apps</a>
<a href="#" className="hover:text-txt transition">Categories</a>
<a href="#" className="hover:text-txt transition">Submit App</a>
</div>
<div className="hidden md:flex items-center gap-3">
<div className="relative"><input type="text" placeholder="Search apps..." className="bg-white/5 border border-white/10 rounded-lg px-3 py-1.5 text-sm text-txt placeholder-muted focus:outline-none focus:border-accent w-44" aria-label="Search apps"/><svg className="absolute right-2.5 top-2 w-4 h-4 text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg></div>
<a href="#" className="text-sm text-muted hover:text-txt transition">Sign In</a>
<a href="#" className="text-sm bg-accent hover:bg-accent/80 text-white px-4 py-1.5 rounded-lg transition font-medium">Submit App</a>
</div>
<button onClick={()=>setMobileMenu(!mobileMenu)} className="md:hidden text-txt" aria-label="Toggle menu"><svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d={mobileMenu?"M6 18L18 6M6 6l12 12":"M4 6h16M4 12h16M4 18h16"}/></svg></button>
</div>
{mobileMenu&&<div className="md:hidden px-4 pb-4 flex flex-col gap-3 text-sm border-t border-white/10 pt-3">
<a href="#" onClick={(e)=>{e.preventDefault();setView('browse');setMobileMenu(false);}} className={`transition ${view==='browse'?'text-txt font-semibold':'text-muted hover:text-txt'}`}>Browse</a>
<a href="#" onClick={(e)=>{e.preventDefault();setView('home');setMobileMenu(false);}} className={`transition ${view==='home'?'text-txt font-semibold':'text-muted hover:text-txt'}`}>New Apps</a>
<a href="#" className="text-muted hover:text-txt">Categories</a><a href="#" className="text-muted hover:text-txt">Submit App</a>
<a href="#" className="text-muted hover:text-txt">Sign In</a><a href="#" className="bg-accent text-white text-center px-4 py-2 rounded-lg">Submit App</a>
</div>}
</nav>

{view === 'home' ? (
  <>
    {/* HERO */}
    <header className="relative overflow-hidden">
    <div className="absolute inset-0 anim-grad opacity-10"></div>
    <div className="absolute inset-0" style={{background:'radial-gradient(ellipse at 50% 0%, rgba(99,102,241,0.15) 0%, transparent 70%)'}}></div>
    <div className="relative max-w-4xl mx-auto px-4 py-16 md:py-24 text-center fade-up">
    <div className="inline-flex items-center gap-2 bg-emerald-500/10 border border-emerald-500/20 rounded-full px-4 py-1.5 text-sm text-emerald-400 mb-6"><span className="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span>19 New Apps This Week</div>
    <h1 className="text-4xl md:text-6xl font-black mb-4 bg-gradient-to-r from-white via-indigo-200 to-teal-200 bg-clip-text text-transparent leading-tight">Discover Newly Submitted Apps</h1>
    <p className="text-muted text-lg md:text-xl max-w-2xl mx-auto mb-8">Fresh software discovered by the AppShift community. Browse, compare, and find your next favorite tool.</p>
    <div className="max-w-xl mx-auto mb-6 relative">
    <svg className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
    <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by name, description, type, or features..." className="w-full bg-white/5 border border-white/10 rounded-xl pl-12 pr-4 py-3.5 text-txt placeholder-muted focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent/50 transition" aria-label="Search apps"/>
    {search&&<button onClick={()=>setSearch('')} className="absolute right-3 top-1/2 -translate-y-1/2 text-muted hover:text-txt text-xl" aria-label="Clear search">×</button>}
    </div>
    <div className="flex flex-wrap justify-center gap-2" role="group" aria-label="Filter chips">
    {CHIPS.map(c=><button key={c} onClick={()=>{setChip(c);setView('browse');}} className={`chip text-sm px-4 py-1.5 rounded-full border transition ${chip===c?'chip-active':'border-white/10 text-muted hover:text-txt'}`}>{c}</button>)}
    </div>
    </div>
    </header>

    {/* STATS */}
    <section className="border-y border-white/10 bg-white/[0.02]" aria-label="Statistics">
    <div className="max-w-7xl mx-auto px-4 py-5 grid grid-cols-2 md:grid-cols-4 gap-4 text-center">
    {[['19','New Apps'],['13','Free or Open Source'],['10+','Platforms'],['6','AI-Powered Tools']].map(([n,l])=><div key={l}><div className="text-2xl font-bold text-accent">{n}</div><div className="text-sm text-muted">{l}</div></div>)}
    </div>
    </section>

    {/* FEATURED SPOTLIGHT */}
    <section className="max-w-7xl mx-auto px-4 py-12" aria-label="Featured App">
    <article className="glass p-6 md:p-8 relative overflow-hidden card-hover">
    <div className="absolute top-0 right-0 w-64 h-64 bg-accent/5 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2"></div>
    <div className="flex flex-col md:flex-row gap-6 relative">
    <div className="md:w-1/2">
    <div className="flex items-center gap-2 mb-3"><span className="bg-yellow-500/20 text-yellow-400 text-xs font-semibold px-3 py-1 rounded-full">⭐ Editor's Pick — Open Source Design Tool</span></div>
    <div className="flex items-center gap-3 mb-3">
    <div className="w-14 h-14 rounded-2xl flex items-center justify-center text-2xl font-bold text-white" style={{background:getColor('O')}}>O</div>
    <div><h2 className="text-2xl font-bold text-txt">Open Pencil</h2><span className="text-xs bg-accent/20 text-accent px-2 py-0.5 rounded-full">UI Design Tool / Vector App</span></div>
    </div>
    <p className="text-muted mb-4">Open-source vector and UI design editor with AI tools, Figma file support, P2P collaboration, and code export.</p>
    <div className="flex flex-wrap gap-2 mb-3">{["Mac","Windows","Linux","Online","Homebrew"].map(p=><span key={p} className="text-xs bg-white/5 border border-white/10 px-2 py-1 rounded-lg text-muted">{p}</span>)}</div>
    <div className="flex flex-wrap gap-1.5 mb-4">{["Real-time Collaboration","AI-Powered","Figma Import","Auto Layout","Design-to-Code (JSX/Tailwind)","WebRTC","MCP Support"].map(f=><span key={f} className="text-xs bg-teal/10 text-teal px-2 py-0.5 rounded-full">{f}</span>)}</div>
    <div className="flex flex-wrap items-center gap-3 text-sm">
    <span className="bg-emerald-500/20 text-emerald-400 px-2.5 py-0.5 rounded-full text-xs font-medium">Free, Open Source (MIT)</span>
    {APPS[5].origin&&<span className="text-muted text-xs">🌍 {APPS[5].origin}</span>}
    <a href="https://openpencil.dev" target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-1 bg-accent hover:bg-accent/80 text-white px-5 py-2 rounded-lg transition font-medium text-sm">Explore Open Pencil →</a>
    </div>
    </div>
    <div className="md:w-1/2 flex items-center justify-center">
    <div className="w-full aspect-video rounded-xl bg-gradient-to-br from-accent/10 to-teal/10 border border-white/10 flex items-center justify-center overflow-hidden relative">
    <svg viewBox="0 0 400 250" className="w-full h-full" xmlns="http://www.w3.org/2000/svg">
    <rect x="0" y="0" width="400" height="30" fill="rgba(255,255,255,0.05)"/>
    <circle cx="15" cy="15" r="4" fill="#ef4444"/><circle cx="30" cy="15" r="4" fill="#f59e0b"/><circle cx="45" cy="15" r="4" fill="#22c55e"/>
    <text x="200" y="18" textAnchor="middle" fill="#94a3b8" fontSize="9" fontFamily="Inter">Open Pencil — Design Editor</text>
    <rect x="0" y="30" width="60" height="220" fill="rgba(255,255,255,0.03)"/>
    <rect x="10" y="45" width="40" height="5" rx="2" fill="rgba(99,102,241,0.4)"/>
    <rect x="10" y="58" width="40" height="5" rx="2" fill="rgba(255,255,255,0.1)"/>
    <rect x="10" y="71" width="40" height="5" rx="2" fill="rgba(255,255,255,0.1)"/>
    <rect x="10" y="84" width="40" height="5" rx="2" fill="rgba(255,255,255,0.1)"/>
    <rect x="80" y="50" width="200" height="160" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(99,102,241,0.3)" strokeWidth="1" strokeDasharray="4"/>
    <rect x="100" y="80" width="80" height="50" rx="6" fill="rgba(99,102,241,0.2)" stroke="rgba(99,102,241,0.5)" strokeWidth="1"/>
    <text x="140" y="110" textAnchor="middle" fill="#6366f1" fontSize="10" fontFamily="Inter">Button</text>
    <rect x="200" y="70" width="60" height="80" rx="6" fill="rgba(20,184,166,0.15)" stroke="rgba(20,184,166,0.4)" strokeWidth="1"/>
    <text x="230" y="115" textAnchor="middle" fill="#14b8a6" fontSize="9" fontFamily="Inter">Card</text>
    <rect x="300" y="50" width="90" height="170" fill="rgba(255,255,255,0.03)"/>
    <rect x="310" y="65" width="70" height="8" rx="3" fill="rgba(255,255,255,0.1)"/>
    <rect x="310" y="80" width="70" height="20" rx="3" fill="rgba(99,102,241,0.15)"/>
    <rect x="310" y="108" width="70" height="8" rx="3" fill="rgba(255,255,255,0.1)"/>
    <rect x="310" y="123" width="70" height="20" rx="3" fill="rgba(20,184,166,0.15)"/>
    <rect x="310" y="151" width="70" height="8" rx="3" fill="rgba(255,255,255,0.1)"/>
    </svg>
    </div>
    </div>
    </div>
    </article>
    </section>

    {/* RECENT APPS (6 items) */}
    <section className="max-w-7xl mx-auto px-4 py-8" aria-label="Recent Apps">
      <div className="flex items-center justify-between mb-8">
        <div>
          <h2 className="text-3xl font-bold text-txt">Recently Added</h2>
          <p className="text-muted mt-1">Check out the latest tools discovered by our community.</p>
        </div>
        <button onClick={()=>setView('browse')} className="hidden sm:flex items-center gap-2 text-accent hover:text-accent/80 font-medium transition group">
          View All Apps <svg className="w-4 h-4 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
        </button>
      </div>
      <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
        {APPS.slice(0, 6).map((app, i) => renderAppCard(app, i))}
      </div>
      <div className="mt-10 text-center sm:hidden">
        <button onClick={()=>setView('browse')} className="inline-flex items-center gap-2 bg-accent hover:bg-accent/80 text-white px-6 py-3 rounded-xl font-medium transition">
          View All Apps <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
        </button>
      </div>
      <div className="mt-12 text-center hidden sm:block">
        <button onClick={()=>setView('browse')} className="inline-flex items-center gap-2 text-muted hover:text-txt transition group">
          Browse all apps in our directory <svg className="w-4 h-4 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
        </button>
      </div>
    </section>

    {/* BROWSE BY CATEGORY */}
    <section className="max-w-7xl mx-auto px-4 pb-16 pt-8" aria-label="Browse by category">
    <h2 className="text-2xl font-bold text-txt mb-6 text-center">Browse by Category</h2>
    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
    {CATEGORIES.map(c=><a key={c.name} href="#" onClick={(e)=>{e.preventDefault();setView('browse');}} className="glass p-5 text-center card-hover group"><div className="text-3xl mb-2">{c.icon}</div><div className="text-sm font-semibold text-txt group-hover:text-accent transition">{c.name}</div><div className="text-xs text-muted mt-1">{c.count} apps</div></a>)}
    </div>
    </section>
  </>
) : (
  <>
    {/* BROWSE VIEW */}
    <div className="pt-24 pb-8 max-w-7xl mx-auto px-4">
      <h1 className="text-4xl font-extrabold text-txt tracking-tight">Directory</h1>
      <p className="text-muted mt-2 text-lg">Explore our full catalog of software and tools.</p>
    </div>
    <section className="max-w-7xl mx-auto px-4 pb-16" aria-label="App listing">
    <div className="flex flex-col lg:flex-row gap-8">
    {/* SIDEBAR - mobile toggle */}
    <div className="lg:hidden mb-2"><button onClick={()=>setMobSidebar(!mobSidebar)} className="w-full glass px-4 py-3 text-sm text-txt flex justify-between items-center"><span>Filters & Sort</span><svg className={`w-4 h-4 transition ${mobSidebar?'rotate-180':''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7"/></svg></button></div>

    {/* SIDEBAR */}
    <aside className={`lg:w-1/3 ${mobSidebar?'block':'hidden'} lg:block`}>
    <div className="glass p-6 lg:sticky lg:top-20 space-y-6">
    <h3 className="text-lg font-bold text-txt">Filters</h3>
    <fieldset><legend className="text-sm font-semibold text-txt mb-2">License</legend>
    {[['all','All Licenses'],['free','Free'],['freemium','Freemium'],['payonce','Pay Once'],['paid','Paid']].map(([v,l])=><label key={v} className="flex items-center gap-2 text-sm text-muted py-1 cursor-pointer hover:text-txt transition"><input type="radio" name="lic" value={v} checked={licFilter===v} onChange={()=>setLicFilter(v)} className="accent-accent"/>{l}</label>)}
    </fieldset>
    <fieldset><legend className="text-sm font-semibold text-txt mb-2">Platform</legend>
    <div className="max-h-40 overflow-y-auto space-y-1">
    {allPlats.map(p=><label key={p} className="flex items-center gap-2 text-sm text-muted py-0.5 cursor-pointer hover:text-txt transition"><input type="checkbox" checked={platFilter.includes(p)} onChange={()=>togglePlat(p)} className="accent-accent rounded"/>{p}</label>)}
    </div>
    </fieldset>
    <fieldset><legend className="text-sm font-semibold text-txt mb-2">App Type</legend>
    <select value={typeFilter} onChange={e=>setTypeFilter(e.target.value)} className="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-sm text-txt focus:outline-none focus:border-accent" aria-label="Filter by app type">
    <option value="all">All Types</option>{allTypes.map(t=><option key={t} value={t}>{t}</option>)}
    </select>
    </fieldset>
    <fieldset><legend className="text-sm font-semibold text-txt mb-2">Sort By</legend>
    <select value={sortBy} onChange={e=>setSortBy(e.target.value)} className="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-sm text-txt focus:outline-none focus:border-accent" aria-label="Sort apps">
    <option value="newest">Newest First</option><option value="name">Name A–Z</option><option value="license">License Type</option>
    </select>
    </fieldset>
    <div className="flex gap-2 pt-2">
    <button onClick={resetFilters} className="flex-1 border border-white/10 text-muted hover:text-txt py-2 rounded-lg text-sm transition">Reset</button>
    <button className="flex-1 bg-accent hover:bg-accent/80 text-white py-2 rounded-lg text-sm transition font-medium">Apply</button>
    </div>
    </div>
    </aside>

    {/* CARD GRID */}
    <div className="lg:w-2/3">
    <div className="flex items-center justify-between mb-4"><p className="text-sm text-muted">{filtered.length} app{filtered.length!==1?'s':''} found</p></div>
    {filtered.length===0?<div className="glass p-12 text-center"><p className="text-muted text-lg mb-2">No apps match your filters.</p><button onClick={resetFilters} className="text-accent hover:underline text-sm">Clear all filters</button></div>:
    <div className="grid sm:grid-cols-2 gap-4">
    {filtered.map((app,i)=>renderAppCard(app, i))}
    </div>}
    </div>
    </div>
    </section>
  </>
)}

{/* NEWSLETTER */}
<section className="relative overflow-hidden" aria-label="Newsletter signup">
<div className="absolute inset-0 anim-grad opacity-5"></div>
<div className="max-w-3xl mx-auto px-4 py-16 text-center relative">
<h2 className="text-3xl md:text-4xl font-bold text-txt mb-4">Stay Ahead of the Curve</h2>
<p className="text-muted text-lg mb-8 max-w-xl mx-auto">Get notified when new apps are submitted to AppShift. Join thousands of developers, designers, and power users who discover software here first.</p>
<form onSubmit={e=>e.preventDefault()} className="flex flex-col sm:flex-row gap-3 max-w-md mx-auto mb-4">
<input type="email" placeholder="you@example.com" className="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-txt placeholder-muted focus:outline-none focus:border-accent transition" aria-label="Email address"/>
<button type="submit" className="bg-accent hover:bg-accent/80 text-white px-6 py-3 rounded-xl font-semibold transition whitespace-nowrap">Subscribe</button>
</form>
<p className="text-xs text-muted">Join the AppShift community — no spam, unsubscribe anytime.</p>
</div>
</section>

{/* FOOTER */}
<footer className="border-t border-white/10 bg-white/[0.02]" aria-label="Footer">
<div className="max-w-7xl mx-auto px-4 py-12">
<div className="flex flex-col md:flex-row justify-between gap-8 mb-8">
<div className="md:w-1/3"><a href="#" onClick={(e)=>{e.preventDefault();setView('home');}} className="flex items-center gap-2 text-xl font-bold text-txt mb-3"><span className="text-accent text-2xl">⬡</span>AppShift</a><p className="text-sm text-muted">Discover, compare, and share software alternatives. Powered by a global community of developers and enthusiasts.</p></div>
<div className="grid grid-cols-2 md:grid-cols-4 gap-6 md:w-2/3">
{[{t:'Browse',ls:['New Apps','Trending','Popular','Categories']},{t:'Community',ls:['Submit App','Discussions','Contributors','Blog']},{t:'About',ls:['About AppShift','Team','Careers','Press Kit']},{t:'Legal',ls:['Privacy Policy','Terms of Use','Cookie Policy','DMCA']}].map(col=><div key={col.t}><h4 className="text-sm font-semibold text-txt mb-3">{col.t}</h4><ul className="space-y-2">{col.ls.map(l=><li key={l}><a href="#" className="text-sm text-muted hover:text-txt transition">{l}</a></li>)}</ul></div>)}
</div>
</div>
<div className="border-t border-white/10 pt-6 flex flex-col sm:flex-row justify-between items-center gap-3 text-xs text-muted">
<span>© 2025 AppShift. All rights reserved.</span>
<div className="flex gap-4"><a href="#" className="hover:text-txt transition">Privacy Policy</a><a href="#" className="hover:text-txt transition">Terms of Use</a></div>
</div>
</div>
</footer>
</div>
)}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(NewAppsPage));
</script>
</body>
</html>
